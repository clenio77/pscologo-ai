<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo com bordas arredondadas (estilo iOS/Android) -->
  <rect width="512" height="512" rx="100" ry="100" fill="#eaf2eb"/>
  <!-- Gradiente sálvia para o fundo -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e9d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d8a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d6b4f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2b3a30" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>
  <!-- Coração principal (símbolo de saúde/cuidado) -->
  <g filter="url(#shadow)">
    <path d="M256 380 C256 380 110 278 110 185 C110 140 145 110 190 110 C218 110 244 126 256 148 C268 126 294 110 322 110 C367 110 402 140 402 185 C402 278 256 380 256 380Z" fill="url(#heartGrad)"/>
  </g>
  <!-- Cruz médica branca no centro do coração -->
  <rect x="236" y="180" width="40" height="90" rx="8" fill="white" opacity="0.85"/>
  <rect x="215" y="201" width="82" height="40" rx="8" fill="white" opacity="0.85"/>
  <!-- Linhas decorativas de pulso (ECG) no fundo -->
  <polyline points="60,350 110,350 130,310 155,385 175,340 195,350 240,350" stroke="#4a7c59" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <polyline points="272,350 320,350 340,310 365,385 385,340 405,350 452,350" stroke="#4a7c59" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
</svg>
