name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (Lint)
        run: npm run lint || echo "Lint warnings/errors detected but continuing build..."

      - name: Run TypeScript Compiler (Type-check)
        run: npx tsc -b

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Application
        run: npm run build
